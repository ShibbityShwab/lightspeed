# cargo-deny configuration for LightSpeed
# https://embarkstudios.github.io/cargo-deny/

# ── Advisories ────────────────────────────────────────────────────────────────
# Check the RustSec Advisory Database for known vulnerabilities.
[advisories]
# Deny crates with known security vulnerabilities.
vulnerability   = "deny"
# Ignore unmaintained crates (not hard-fail; many are safe transitive deps).
unmaintained    = "none"
# Ignore yanked warnings (handled by cargo audit separately).
yanked          = "allow"
# Ignore unsound warnings (not hard-fail).
unsound         = "none"

# Known advisories we acknowledge and accept risk for pending upgrades.
# Each entry is justified below.
ignore = [
  # protobuf 2.x recursion crash — transitive via prometheus monitoring only;
  # no user-controlled protobuf parsing in our attack surface.
  { id = "RUSTSEC-2024-0437", reason = "protobuf used only in prometheus monitoring; no user-controlled parsing surface" },
  # quinn-proto DoS — Quinn upgrade to >=0.11.14 is in progress.
  { id = "RUSTSEC-2026-0037", reason = "quinn-proto DoS; upgrading quinn dependency is planned" },
  # rustls-webpki CRL matching — transitive via quinn/rustls; no CRL
  # distribution points used in our mTLS setup.
  { id = "RUSTSEC-2026-0049", reason = "rustls-webpki CRL matching; no CRL distribution points used" },
  # rustls-webpki name constraints URI — we do not use URI SANs.
  { id = "RUSTSEC-2026-0098", reason = "rustls-webpki URI name constraints; URI SANs not used" },
  # rustls-webpki wildcard name constraints — we do not use wildcard certs.
  { id = "RUSTSEC-2026-0099", reason = "rustls-webpki wildcard name constraints; wildcard certs not used" },
  # rustls-webpki CRL panic — transitive; CRL parsing not exposed.
  { id = "RUSTSEC-2026-0104", reason = "rustls-webpki CRL parse panic; CRL parsing not exposed" },
]

# ── Licenses ──────────────────────────────────────────────────────────────────
# Only allow permissive open-source licenses appropriate for a free tool.
[licenses]
# Fail on any license not in the allow list.
unlicensed      = "deny"
# Deny copyleft licenses that would affect distribution.
copyleft        = "deny"
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "OpenSSL",
]
# Some crates use AND/OR expressions; evaluate strictly.
unused-allowed-license = "warn"

# ── Bans ──────────────────────────────────────────────────────────────────────
# Detect problematic duplicate dependencies and banned crates.
[bans]
# Warn on multiple versions of the same crate (common in Rust, hard to fully
# deny, but worth surfacing for review).
multiple-versions = "warn"
# Deny crates with known-unsafe or problematic characteristics.
wildcards         = "allow"   # workspace = dev, fine

# Explicitly denied crates (none currently, kept for future use).
deny = []

# Skip duplicate-version warnings for crates where two versions commonly
# coexist in the Rust ecosystem and upgrading isn't directly actionable.
skip = [
  # syn 1.x and 2.x both pulled in by proc-macro crates
  { name = "syn" },
  # windows-sys crate family has many coexisting versions
  { name = "windows-sys" },
  { name = "windows-targets" },
  { name = "windows_x86_64_msvc" },
  { name = "windows_x86_64_gnu" },
  { name = "windows_aarch64_msvc" },
  { name = "windows_i686_msvc" },
  { name = "windows_i686_gnu" },
  # hashbrown 0.12 + 0.14 from indexmap / hashbrown upgrades
  { name = "hashbrown" },
  # redox_syscall 0.3 + 0.4 from tempfile / parking_lot
  { name = "redox_syscall" },
]

# ── Sources ───────────────────────────────────────────────────────────────────
# Only allow crates from crates.io (no git dependencies in production).
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
