name: Deploy Proxy to Vultr

on:
  push:
    branches: [ master ]
    paths:
      - 'proxy/**'
      - 'protocol/**'
      - 'infra/scripts/deploy-vultr.sh'
  workflow_dispatch: # Allows manual trigger from GitHub UI

# Prevent concurrent deploys: if a new deploy is queued while one is running,
# the running deploy completes first (cancel-in-progress: false).
# This prevents the ETXTBSY race where two concurrent deploys both try to
# mv/overwrite the binary on the same node at the same time.
concurrency:
  group: deploy-vultr-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libpcap-dev

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VULTR_SSH_KEY }}" > ~/.ssh/lightspeed_vultr
          chmod 600 ~/.ssh/lightspeed_vultr
          # Note: deploy-vultr.sh uses StrictHostKeyChecking=no, so no ssh-keyscan needed.
          # To add known_hosts for your own nodes, add their IPs to a DEPLOY_KNOWN_HOSTS secret
          # and uncomment: echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Build and Deploy Proxy
        run: |
          chmod +x infra/scripts/deploy-vultr.sh
          # The deploy script automatically builds the release binary and scp's it to the nodes
          ./infra/scripts/deploy-vultr.sh