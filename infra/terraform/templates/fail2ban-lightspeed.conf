# Fail2Ban configuration for LightSpeed Proxy
#
# Bans IPs that repeatedly fail authentication or trigger abuse detection.
# Works alongside the built-in Rust rate limiter for defense-in-depth.

[sshd]
enabled  = true
port     = ssh
filter   = sshd
logpath  = /var/log/secure
maxretry = 3
bantime  = 3600
findtime = 600

# Custom jail for proxy abuse (monitors Docker container logs)
# The proxy logs abuse events at WARN level with "ABUSE_BAN" marker
[lightspeed-proxy]
enabled  = true
port     = 4434
protocol = udp
filter   = lightspeed-proxy
logpath  = /var/log/lightspeed-proxy.log
maxretry = 5
bantime  = 86400
findtime = 600
action   = iptables-allports[name=lightspeed, protocol=all]
