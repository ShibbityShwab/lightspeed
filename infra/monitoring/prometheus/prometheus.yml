# ──────────────────────────────────────────────────────────────
# LightSpeed — Prometheus Configuration
#
# Scrapes metrics from all proxy nodes in the mesh.
# Deploy alongside Grafana via docker-compose.
# ──────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alerting rules
rule_files:
  - "alerts.yml"

# Scrape targets — each proxy node exposes :8080/metrics
scrape_configs:
  # ── Proxy Nodes ────────────────────────────────────────────
  - job_name: "lightspeed-proxy"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      # US-West LAX (primary)
      - targets: ["149.28.84.139:8080"]
        labels:
          node_id: "proxy-lax"
          region: "us-west-lax"
          provider: "vultr"
          role: "primary"

      # Asia Singapore (SEA relay)
      - targets: ["149.28.144.74:8080"]
        labels:
          node_id: "relay-sgp"
          region: "asia-sgp"
          provider: "vultr"
          role: "relay"

  # ── Prometheus self-monitoring ─────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
